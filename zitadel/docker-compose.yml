name: zitadel

# ─────────────────────────────────────────────────────────────────────────────
# Standalone Zitadel identity provider.
# Runs independently of OpenWind. OpenWind connects via the shared
# `openwind_zitadel` Docker network (ow-backend calls http://zitadel:8080).
#
# Local:   http://localhost:8080  (Zitadel UI + API)
# Admin:   owZitadelAdmin@openwind.local / Admin1234!
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Wipe:    docker compose down -v
# Logs:    docker compose logs -f zitadel
#
# After first boot, run the OpenWind bootstrap to configure the org, users,
# OIDC clients, and write credentials into OpenWind's .env.local:
#   cd ../OpenWind && docker compose --profile bootstrap run --rm bootstrap
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Zitadel database (dedicated — not shared with OpenWind) ────────────────
  zitadel-db:
    container_name: zitadel-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel_dev_password
      POSTGRES_DB: zitadel
    volumes:
      - zitadel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitadel -d zitadel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # ── Zitadel identity provider ──────────────────────────────────────────────
  zitadel:
    container_name: zitadel
    image: ghcr.io/zitadel/zitadel:v4.15.1
    restart: unless-stopped
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel_dev_password
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel_dev_password
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "${ZITADEL_EXTERNALSECURE:-false}"
      ZITADEL_EXTERNALPORT: "${ZITADEL_EXTERNALPORT:-8080}"
      ZITADEL_EXTERNALDOMAIN: "${ZITADEL_EXTERNALDOMAIN:-localhost}"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: owZitadelAdmin@openwind.local
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin1234!
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
      # Token Exchange (RFC 8693) lets gen-pat.mjs convert a session token into
      # an OAuth access token without a browser — needed for headless PAT generation.
      ZITADEL_DEFAULTINSTANCE_FEATURES_TOKENEXCHANGE: "true"
      # NOTE: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_* vars are intentionally omitted.
      # In Zitadel v4.x they cause a duplicate instance_domain bug that crashes init.
      # gen-pat.mjs (ow-zita-setup) creates the PAT automatically via Sessions API v2.
    ports:
      - "${ZITADEL_HOST_PORT:-8080}:8080"
    depends_on:
      zitadel-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - internal
      - openwind_zitadel # shared with OpenWind so ow-backend reaches zitadel:8080

  # ── PAT generator (one-time setup) — profile:setup ───────────────────────────
  # Starts after Zitadel is healthy, generates a Personal Access Token for the
  # admin user via the Sessions API + Token Exchange, then prints the token and
  # the exact command to run in the OpenWind folder.
  #
  # Usage (run from this directory):
  #   setup.bat        # Windows
  #   ./setup.sh       # Linux / Mac
  # which runs:
  #   docker compose up -d && docker compose --profile setup run --rm ow-zita-setup
  ow-zita-setup:
    container_name: ow-zita-setup
    profiles: [setup]
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
    command: node /app/scripts/gen-pat.mjs
    environment:
      ZITADEL_EXTERNALDOMAIN: "${ZITADEL_EXTERNALDOMAIN:-localhost}"
    networks:
      - openwind_zitadel # reaches zitadel:8080 via this shared network
    depends_on:
      zitadel:
        condition: service_healthy
    restart: "no"

networks:
  internal:
    internal: true # zitadel-db is not reachable from outside
  openwind_zitadel:
    name: openwind_zitadel # OpenWind joins this as external network

volumes:
  zitadel_db_data:
