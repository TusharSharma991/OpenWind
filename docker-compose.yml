name: platform

# ─────────────────────────────────────────────────────────────────────────────
# Local development environment.
#
# Services:
#   postgres   — Primary database (RLS-enabled, multi-tenant)
#   pgbouncer  — Connection pooler (transaction mode, required for RLS)
#   openbao    — Secrets manager (OpenBao dev mode, auto-unsealed)
#   redis      — Queue backend (BullMQ) + application cache
#   minio      — S3-compatible object storage (local)
#   zitadel    — Identity provider (OIDC/OAuth2/SAML)
#   novu       — Notification infrastructure
#   mailhog    — Local SMTP trap (catches all outbound email)
#   bullboard  — BullMQ job queue dashboard
#
# Start everything:    docker compose up -d
# Stop everything:     docker compose down
# Reset all data:      docker compose down -v
# View logs:           docker compose logs -f [service]
#
# App connects to:     postgres://app_user:...@localhost:6432/platform  (PgBouncer)
# OpenBao UI/API:      http://localhost:8200  (token: dev-root-token)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_dev_password
      POSTGRES_DB: platform
      # Enable pg_stat_statements for query performance analysis
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p] %u@%d '
        -c log_statement=ddl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── PgBouncer (connection pooler) ─────────────────────────────────────────
  # Transaction mode is required so SET LOCAL app.tenant_id scoping works
  # correctly — session mode would let the setting leak across pooled connections.
  pgbouncer:
    image: bitnami/pgbouncer:latest
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: platform
      POSTGRESQL_USERNAME: app_user
      POSTGRESQL_PASSWORD: app_user_dev_password
      PGBOUNCER_DATABASE: platform
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_AUTH_TYPE: scram-sha-256
    ports:
      - "6432:6432"   # App connects here, not 5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "app_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── OpenBao (secrets manager) ──────────────────────────────────────────────
  # Dev mode: auto-unsealed, single static root token, data not persisted.
  # The init container creates the Transit secrets engine and the
  # platform-credentials key with derivation enabled.
  openbao:
    image: openbao/openbao:latest
    restart: unless-stopped
    command: server -dev -dev-root-token-id=dev-root-token
    environment:
      BAO_DEV_ROOT_TOKEN_ID: dev-root-token
      BAO_ADDR: http://0.0.0.0:8200
      BAO_LOG_LEVEL: warn
    ports:
      - "8200:8200"   # OpenBao API + UI → http://localhost:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot container that configures OpenBao after it starts
  openbao-init:
    image: openbao/openbao:latest
    depends_on:
      openbao:
        condition: service_healthy
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: dev-root-token
    entrypoint: >
      /bin/sh -c "
        bao secrets enable transit &&
        bao write -f transit/keys/platform-credentials derived=true &&
        echo 'OpenBao Transit key created with derivation enabled'
      "
    restart: "no"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (local S3) ───────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: platform_access_key
      MINIO_ROOT_PASSWORD: platform_secret_key_dev_only
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initializer — creates the platform bucket on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 platform_access_key platform_secret_key_dev_only &&
        mc mb --ignore-existing local/platform-files &&
        mc anonymous set none local/platform-files &&
        echo 'MinIO bucket initialized'
      "

  # ── Zitadel (Identity provider) ────────────────────────────────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    restart: unless-stopped
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: platform
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: platform_dev_password
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: platform
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: platform_dev_password
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@platform.local
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin1234!
    ports:
      - "8080:8080"   # Zitadel UI + API → http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Novu (Notifications) ───────────────────────────────────────────────────
  novu-api:
    image: ghcr.io/novuhq/novu/api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_ROOT_URL: http://localhost:3010
      FRONT_BASE_URL: http://localhost:4200
      MONGO_URL: mongodb://novu-mongo:27017/novu
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: novu_dev_jwt_secret_change_in_prod
      STORE_ENCRYPTION_KEY: "=<pAs&zYAHF3kRZr"
    ports:
      - "3010:3000"
    depends_on:
      - novu-mongo
      - redis

  novu-worker:
    image: ghcr.io/novuhq/novu/worker:latest
    restart: unless-stopped
    environment:
      NODE_ENV: development
      MONGO_URL: mongodb://novu-mongo:27017/novu
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: novu_dev_jwt_secret_change_in_prod
      STORE_ENCRYPTION_KEY: "=<pAs&zYAHF3kRZr"
    depends_on:
      - novu-mongo
      - redis

  novu-web:
    image: ghcr.io/novuhq/novu/web:latest
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:3010
    ports:
      - "4200:4200"   # Novu dashboard → http://localhost:4200

  novu-mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - novu_mongo_data:/data/db

  # ── Mailhog (local email trap) ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    environment:
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /mailhog-data
    volumes:
      - mailhog_data:/mailhog-data

  # ── Bull Board (queue dashboard) ───────────────────────────────────────────
  bullboard:
    image: deadly0/bull-board:latest
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USE_TLS: "false"
    ports:
      - "3099:3000"   # Bull Board UI → http://localhost:3099
    depends_on:
      - redis

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  novu_mongo_data:
  mailhog_data:
  # OpenBao has no volume — dev mode data is ephemeral by design
